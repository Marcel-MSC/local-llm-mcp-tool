# Fly.io deployment configuration for Local LLM MCP Tool
#
# First time: fly launch  (creates app, or use --now to deploy immediately)
# Deploy:     fly deploy
#
# Required: Set MODEL_URL to download a model at startup, e.g.:
#   fly secrets set MODEL_URL="https://huggingface.co/bartowski/Llama-3.2-1B-Instruct-GGUF/resolve/main/Llama-3.2-1B-Instruct-Q4_K_M.gguf"
#
# MCP endpoint: https://<your-app>.fly.dev/mcp

app = "local-llm-mcp"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"

# HTTP service - MCP server runs on Streamable HTTP at /mcp
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 5
    hard_limit = 10

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "10s"

# LLM inference needs substantial memory - use at least 2GB
[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2

[deploy]
  strategy = "rolling"
  wait_timeout = "10m"
