<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Local LLM Chat{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-logo">Local LLM</a>
    <div class="nav-links">
      <a href="/">Chat</a>
      <a href="/config">Config</a>
      <a href="/dashboard">Dashboard</a>
    </div>
  </nav>
  <main class="main {% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
